# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua

#autogenerated = 1
# Désactiver l'écran virtuel fantôme
monitor = Unknown-1, disable

# Définition explicite de l'écran principal (PC portable)
monitor = eDP-1, 1920x1080@120, 0x1080, 1

# Définition explicite de l'écran externe (HP) au-dessus
monitor = HDMI-A-1, 1920x1080@60, 0x0, 1

$mainMod = SUPER
$terminal = terminator
$fileManager = dolphin
$menu = hyprlauncher

bind = $mainMod, return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, D, exec, BEMENU_BACKEND=wayland bemenu-run
bind = $mainMod, L, exec, hyprlock

# Aller sur un espace de travail (SUPER + 1, 2, 3...) via Keycodes AZERTY bruts
bind = $mainMod, code:10, workspace, 1
bind = $mainMod, code:11, workspace, 2
bind = $mainMod, code:12, workspace, 3
bind = $mainMod, code:13, workspace, 4
bind = $mainMod, code:14, workspace, 5

# Déplacer la fenêtre active sur un espace (SUPER + SHIFT + 1, 2, 3...)
bind = $mainMod SHIFT, code:10, movetoworkspace, 1
bind = $mainMod SHIFT, code:11, movetoworkspace, 2
bind = $mainMod SHIFT, code:12, movetoworkspace, 3
bind = $mainMod SHIFT, code:13, movetoworkspace, 4
bind = $mainMod SHIFT, code:14, movetoworkspace, 5

bind = $mainMod, right, workspace, +1
bind = $mainMod, left,  workspace, -1

# Déplacer une fenêtre avec SUPER + Clic Gauche
bindm = $mainMod, mouse:272, movewindow

# Redimensionner une fenêtre avec SUPER + Clic Droit
bindm = $mainMod, mouse:273, resizewindow

# Nettoyer/Fermer tous les espaces de travail vides non actifs
bind = $mainMod, BackSpace, exec, hyprctl dispatch cleanuptiles

bind = , code:232, exec, brightnessctl set 5%-
bind = , code:233, exec, brightnessctl set +5%

bindl = , XF86AudioPlay, exec, playerctl play-pause                                         # Pause audio/video
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle                   # Mute audio
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-           # Decrease volume
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 10%+    # Increase volume upto 150

# F8 : Mode Miroir (on clone l'écran principal sans coordonnées conflictuelles)
bind = , F8, exec, hyprctl keyword monitor "HDMI-A-1, 1920x1080@60, auto, 1, mirror, eDP-1"

# F9 : Mode Étendu (on réapplique exactement votre configuration qui marche)
bind = , F9, exec, hyprctl keyword monitor "eDP-1, 1920x1080@120, 0x1080, 1" && hyprctl keyword monitor "HDMI-A-1, 1920x1080@60, 0x0, 1"


input {
    kb_layout = fr

    # On s'assure que le focus ne reste pas bloqué
    follow_mouse = 1

    touchpad {
        # Active le défilement à deux doigts
        #disable_behavior_setting = false

        # Sensation naturelle (true = faire défiler vers le bas fait monter la page)
        natural_scroll = true

        # Optionnel : permet de faire un clic droit en tapant avec deux doigts
        tap-to-click = true
    }
}

# Waybar
exec-once = waybar
exec-once= hyprpaper
